<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trail Blazer: An Ultralight Backpacking Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="controls">
    <strong>Controls:</strong>
    Arrow Keys / WASD = Move &nbsp;|&nbsp;
    Z / Space = Jump &nbsp;|&nbsp;
    Down + Move = Glissade (slide &amp; stun) &nbsp;|&nbsp;
    X = Bear Spray (stun enemies) &nbsp;|&nbsp;
    Stomp enemies by jumping on them!
  </div>
  <div id="touch-controls">
    <div id="touch-left">
      <button class="touch-btn" id="btn-left">&#9664;</button>
      <button class="touch-btn" id="btn-right">&#9654;</button>
    </div>
    <div id="touch-right">
      <div class="touch-row">
        <button class="touch-btn" id="btn-down">SLIDE</button>
        <button class="touch-btn" id="btn-spray">SPRAY</button>
      </div>
      <div class="touch-row">
        <button class="touch-btn touch-btn-jump" id="btn-jump">JUMP</button>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDQ-KG90VZUtGhNt6fl9FQC-5MaESv0gAw",
      authDomain: "trail-blazer-b8b62.firebaseapp.com",
      projectId: "trail-blazer-b8b62",
      storageBucket: "trail-blazer-b8b62.firebasestorage.app",
      messagingSenderId: "444959545616",
      appId: "1:444959545616:web:af1f112bbb16b6f430ad95"
    });
    window.db = firebase.firestore();
  </script>
  <script src="game.js"></script>
</body>
</html>
