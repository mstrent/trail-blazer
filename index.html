<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trail Blazer: An Ultralight Backpacking Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="controls">
    <strong>Controls:</strong>
    Arrow Keys / WASD = Move &nbsp;|&nbsp;
    Z / Space = Jump &nbsp;|&nbsp;
    Down + Jump = Trekking Pole Pogo &nbsp;|&nbsp;
    X = Bear Spray (stun enemies) &nbsp;|&nbsp;
    Stomp enemies by jumping on them!
  </div>
  <div id="touch-controls">
    <div id="touch-left">
      <div class="touch-row">
        <button class="touch-btn" id="btn-left">&#9664;</button>
        <button class="touch-btn" id="btn-right">&#9654;</button>
      </div>
      <div class="touch-row">
        <button class="touch-btn" id="btn-down">POGO</button>
      </div>
    </div>
    <div id="touch-right">
      <button class="touch-btn" id="btn-spray">SPRAY</button>
      <button class="touch-btn touch-btn-jump" id="btn-jump">JUMP</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
